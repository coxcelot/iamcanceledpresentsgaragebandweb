<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>GarageBand Web</title><style>:root{--bg:#1a1a1a;--surf:#242424;--surf2:#2e2e2e;--surf3:#383838;--acc:#ff6b35;--acc2:#4ecdc4;--acc3:#a29bfe;--text:#e8e8e8;--dim:#888;--bdr:#444;--red:#e74c3c;--yellow:#f1c40f;--green:#2ecc71}*{box-sizing:border-box;margin:0;padding:0;user-select:none}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',sans-serif;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}button{cursor:pointer;font-family:inherit;font-size:12px}input{font-family:inherit;font-size:12px}/* TOP BAR */#topbar{height:52px;background:#111;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;padding:0 10px;flex-shrink:0;z-index:50}#topbar .logo{font-size:16px;font-weight:800;color:var(--acc);letter-spacing:-0.5px;margin-right:8px;white-space:nowrap}.sep{width:1px;height:28px;background:var(--bdr);margin:0 4px}.tbtn{background:var(--surf3);border:1px solid var(--bdr);color:var(--text);padding:5px 10px;border-radius:5px;transition:all .15s}.tbtn:hover{background:var(--surf2);border-color:#666}.tbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}.tbtn.rec-btn{border-color:#c0392b;color:var(--red)}.tbtn.rec-btn.on{background:#c0392b;color:#fff}#tempo-wrap{display:flex;align-items:center;gap:4px}#tempo-wrap label{color:var(--dim);font-size:11px}#tempo{width:48px;background:var(--surf2);border:1px solid var(--bdr);color:var(--text);padding:4px 6px;border-radius:5px;text-align:center}#sig-sel{background:var(--surf2);border:1px solid var(--bdr);color:var(--text);padding:4px 6px;border-radius:5px}#transport-time{font-family:'SF Mono',monospace;font-size:15px;color:var(--acc2);min-width:80px;text-align:center;letter-spacing:1px}#vol-master-wrap{display:flex;align-items:center;gap:4px;margin-left:auto}#vol-master-wrap label{color:var(--dim);font-size:11px}#vol-master{width:80px;accent-color:var(--acc)}/* MAIN LAYOUT */#app{display:flex;flex:1;overflow:hidden}/* LEFT: instruments panel */#inst-panel{width:200px;background:#111;border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0}#inst-panel h4{padding:8px 10px;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--bdr)}.inst-item{padding:8px 10px;border-bottom:1px solid #1a1a1a;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}.inst-item:hover{background:var(--surf)}.inst-item.sel{background:#2a1f14;border-left:2px solid var(--acc)}.inst-item .icon{font-size:16px}.inst-item .info{display:flex;flex-direction:column}.inst-item .iname{font-size:12px;font-weight:600}.inst-item .itype{font-size:10px;color:var(--dim)}#add-track-btn{margin:8px;padding:7px;background:var(--surf3);border:1px solid var(--bdr);color:var(--text);border-radius:5px;width:calc(100% - 16px);transition:all .15s}#add-track-btn:hover{background:var(--acc);border-color:var(--acc);color:#fff}/* CENTER: arrange + piano roll */#center{flex:1;display:flex;flex-direction:column;overflow:hidden}/* ARRANGE */#arrange{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}#timeline-bar{height:28px;background:#111;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;display:flex}#tl-corner{width:180px;flex-shrink:0;border-right:1px solid var(--bdr);display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:0 6px}#tl-ruler{flex:1;position:relative;overflow:hidden;cursor:pointer}#tracks-scroll{flex:1;overflow:auto;position:relative}#tracks-container{position:relative;min-width:3200px}.track-row{display:flex;height:72px;border-bottom:1px solid var(--bdr);position:relative}.track-head{width:180px;background:var(--surf);border-right:1px solid var(--bdr);flex-shrink:0;padding:5px 6px;display:flex;flex-direction:column;gap:3px;position:sticky;left:0;z-index:5}.track-name-row{display:flex;align-items:center;gap:4px}.track-name{font-size:11px;font-weight:700;flex:1;background:transparent;border:none;color:var(--text);outline:none;cursor:default}.track-name:focus{cursor:text;background:var(--surf2);border-radius:3px;padding:1px 3px}.track-btns{display:flex;gap:3px}.trkbtn{width:20px;height:20px;font-size:9px;border-radius:3px;background:var(--surf3);border:1px solid var(--bdr);color:var(--text)}.trkbtn.on{background:var(--acc);color:#fff}.trkbtn.mute.on{background:var(--red)}.trkbtn.solo.on{background:var(--yellow);color:#000}.track-vol-row{display:flex;align-items:center;gap:4px}.track-vol-row label{font-size:9px;color:var(--dim);width:20px}.track-vol{width:80px;accent-color:var(--acc2)}.track-pan{width:60px;accent-color:var(--acc3)}.track-lane{flex:1;position:relative;background:repeating-linear-gradient(to right,#1e1e1e 0,#1e1e1e 1px,transparent 1px,transparent 80px);cursor:crosshair}#playhead{position:absolute;top:0;width:2px;background:var(--red);z-index:8;pointer-events:none;box-shadow:0 0 4px rgba(231,76,60,.6)}/* CLIPS */.clip{position:absolute;top:4px;bottom:4px;border-radius:4px;cursor:pointer;overflow:hidden;border:1px solid rgba(255,255,255,.15);display:flex;flex-direction:column}.clip canvas{width:100%;flex:1;display:block}.clip-label{font-size:9px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}.clip.midi-clip{background:linear-gradient(180deg,#2a4a3a,#1a3a2a)}.clip.audio-clip{background:linear-gradient(180deg,#1a2a4a,#0a1a3a)}.clip.sel{box-shadow:0 0 0 2px var(--acc)}/* PIANO ROLL */#pianoroll-wrap{height:0;background:var(--bg);border-top:2px solid var(--bdr);display:flex;flex-direction:column;transition:height .2s;overflow:hidden}#pianoroll-wrap.open{height:320px}#pr-topbar{height:36px;background:#111;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px;padding:0 10px;flex-shrink:0}#pr-topbar h3{font-size:11px;font-weight:700;margin-right:8px}#pr-body{flex:1;display:flex;overflow:hidden}#pr-keys{width:40px;flex-shrink:0;border-right:1px solid var(--bdr);background:#111;overflow:hidden;position:relative}#pr-scroll{flex:1;overflow:auto;position:relative}#pr-grid{position:relative}/* MIXER */#mixer-panel{position:fixed;bottom:0;left:0;right:0;height:220px;background:#111;border-top:2px solid var(--bdr);display:flex;z-index:40;transform:translateY(100%);transition:transform .2s}#mixer-panel.open{transform:translateY(0)}#mixer-inner{display:flex;flex:1;overflow-x:auto;overflow-y:hidden;padding:8px}#mixer-master{border-right:2px solid var(--bdr);padding:8px;margin-right:8px;flex-shrink:0}.mixer-strip{width:70px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;background:var(--surf);border-radius:5px;margin-right:5px;flex-shrink:0}.mixer-strip .strip-name{font-size:9px;font-weight:700;text-align:center;word-break:break-all;color:var(--dim)}.fader-wrap{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;width:100%}.fader-wrap input[type=range]{writing-mode:vertical-lr;direction:rtl;width:24px;height:100%;accent-color:var(--acc)}.vu{width:8px;height:80px;background:var(--surf3);border-radius:3px;overflow:hidden;position:relative}.vu-bar{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,var(--green),var(--yellow),var(--red));transition:height .05s}.strip-pan{width:50px;accent-color:var(--acc3)}.strip-btn{font-size:9px;padding:2px 5px;border-radius:3px;background:var(--surf3);border:1px solid var(--bdr);color:var(--text)}.strip-btn.on{background:var(--red)}/* EFFECTS */#fx-panel{position:fixed;top:60px;right:0;width:260px;background:#111;border-left:2px solid var(--bdr);bottom:0;z-index:40;transform:translateX(100%);transition:transform .2s;display:flex;flex-direction:column}#fx-panel.open{transform:translateX(0)}#fx-inner{flex:1;overflow-y:auto;padding:8px}.fx-slot{background:var(--surf);border:1px solid var(--bdr);border-radius:5px;padding:8px;margin-bottom:6px}.fx-slot h5{font-size:10px;color:var(--acc);margin-bottom:5px}.fx-knob-row{display:flex;gap:6px;flex-wrap:wrap}.fx-knob{display:flex;flex-direction:column;align-items:center;gap:2px}.fx-knob input{width:48px;accent-color:var(--acc)}.fx-knob label{font-size:9px;color:var(--dim)}/* DRUM MACHINE */#drum-panel{position:fixed;bottom:0;left:0;right:0;height:200px;background:#111;border-top:2px solid var(--bdr);z-index:40;transform:translateY(100%);transition:transform .2s;display:flex;flex-direction:column}#drum-panel.open{transform:translateY(0)}#drum-inner{flex:1;overflow:auto;padding:8px}.drum-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}.drum-row .drum-name{width:60px;font-size:10px;color:var(--dim);text-align:right;padding-right:6px;flex-shrink:0}.drum-pad{width:28px;height:28px;border-radius:4px;background:var(--surf2);border:1px solid var(--bdr);transition:all .1s}.drum-pad.on{background:var(--acc);border-color:var(--acc)}.drum-pad:hover{border-color:var(--acc2)}/* KEYBOARD */#keyboard-panel{position:fixed;bottom:0;left:0;right:0;height:140px;background:#111;border-top:2px solid var(--bdr);z-index:40;transform:translateY(100%);transition:transform .2s;display:flex;flex-direction:column}#keyboard-panel.open{transform:translateY(0)}#kb-wrap{flex:1;display:flex;overflow-x:auto;overflow-y:hidden;padding:4px 8px;position:relative}#kb-wrap .kb-key{display:inline-flex;align-items:flex-end;justify-content:center;padding-bottom:4px;cursor:pointer;font-size:9px;border-radius:0 0 3px 3px;flex-shrink:0;border:1px solid #333}.kb-key.white{width:28px;height:100%;background:#f0f0f0;color:#333;z-index:1;border-top:none}.kb-key.black{width:18px;height:60%;background:#111;color:#888;z-index:2;margin-left:-9px;margin-right:-9px;border-top:none}.kb-key.white:hover,.kb-key.white.active{background:#ffe0c0}.kb-key.black:hover,.kb-key.black.active{background:#663300}canvas#waveform-canvas{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.3}</style></head><body><div id="topbar"><div class="logo">&#127928; GarageBand Web</div><div class="sep"></div><button class="tbtn" id="btn-rewind" title="Rewind">&#9198;</button><button class="tbtn" id="btn-play" title="Play">&#9654;</button><button class="tbtn rec-btn" id="btn-rec" title="Record">&#9679;</button><button class="tbtn" id="btn-stop" title="Stop">&#9646;&#9646;</button><div class="sep"></div><div id="tempo-wrap"><label>BPM</label><input id="tempo" type="number" value="120" min="40" max="280"></div><select id="sig-sel"><option>4/4</option><option>3/4</option><option>6/8</option></select><div id="transport-time">0:00.000</div><div class="sep"></div><button class="tbtn" id="btn-metro">&#9836; Metro</button><button class="tbtn" id="btn-keyboard">&#127929; Keys</button><button class="tbtn" id="btn-drums">&#129345; Drums</button><button class="tbtn" id="btn-mixer">&#127908; Mixer</button><button class="tbtn" id="btn-fx">FX</button><div class="sep"></div><button class="tbtn" id="btn-save">Save</button><button class="tbtn" id="btn-load">Load</button><button class="tbtn" id="btn-export">Export WAV</button><input type="file" id="file-load" accept=".gbweb" style="display:none"><div id="vol-master-wrap"><label>Master</label><input id="vol-master" type="range" min="0" max="1" step=".01" value="0.85"></div></div><div id="app"><div id="inst-panel"><h4>Instruments</h4><div id="inst-list"></div><button id="add-track-btn">+ Add Track</button></div><div id="center"><div id="arrange"><div id="timeline-bar"><div id="tl-corner"><button class="tbtn" style="font-size:10px;padding:2px 5px" id="btn-zoom-out">&#8722;</button><button class="tbtn" style="font-size:10px;padding:2px 5px" id="btn-zoom-in">+</button></div><canvas id="tl-ruler"></canvas></div><div id="tracks-scroll"><div id="tracks-container"><div id="playhead"></div></div></div></div><div id="pianoroll-wrap"><div id="pr-topbar"><h3>Piano Roll</h3><button class="tbtn" id="pr-tool-draw" title="Draw">&#9998;</button><button class="tbtn" id="pr-tool-sel" title="Select">&#9654;</button><button class="tbtn" id="pr-tool-erase" title="Erase">&#10006;</button><div class="sep"></div><select id="pr-quant"><option value="0.25">1/16</option><option value="0.5" selected>1/8</option><option value="1">1/4</option><option value="2">1/2</option></select><div class="sep"></div><button class="tbtn" id="pr-close">&#10006; Close</button></div><div id="pr-body"><canvas id="pr-keys"></canvas><div id="pr-scroll"><canvas id="pr-grid"></canvas></div></div></div></div></div><div id="mixer-panel"><div id="mixer-inner"><div id="mixer-master"><div class="mixer-strip"><div class="strip-name">MASTER</div><div class="fader-wrap"><input type="range" id="master-fader" min="0" max="1" step=".01" value="0.85"><div class="vu"><div class="vu-bar" id="vu-master" style="height:0%"></div></div></div></div></div><div id="mixer-tracks"></div></div></div><div id="fx-panel"><div style="padding:8px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;font-weight:700">Effects</span><button class="tbtn" id="fx-close">&#10006;</button></div><div id="fx-inner"></div></div><div id="drum-panel"><div style="padding:6px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px"><span style="font-size:11px;font-weight:700">Drum Machine</span><button class="tbtn" id="drum-play-btn">&#9654; Play</button><select id="drum-swing"><option value="0">No Swing</option><option value="0.1">Light Swing</option><option value="0.2">Heavy Swing</option></select><button class="tbtn" id="drum-clear">Clear</button><button class="tbtn" id="drum-random">Random</button><button class="tbtn" style="margin-left:auto" id="drum-close">&#10006;</button></div><div id="drum-inner"></div></div><div id="keyboard-panel"><div style="padding:6px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px"><span style="font-size:11px;font-weight:700">Keyboard</span><label style="font-size:10px;color:var(--dim)">Oct</label><button class="tbtn" id="kb-oct-down">&#9660;</button><span id="kb-oct-label" style="font-size:11px;min-width:20px;text-align:center">4</span><button class="tbtn" id="kb-oct-up">&#9650;</button><select id="kb-inst-sel" style="background:var(--surf2);border:1px solid var(--bdr);color:var(--text);padding:3px 6px;border-radius:4px"></select><button class="tbtn" style="margin-left:auto" id="kb-close">&#10006;</button></div><div id="kb-wrap"></div></div><script>const AC=new(window.AudioContext||window.webkitAudioContext)();const MASTER=AC.createGain();MASTER.gain.value=0.85;const COMPRESSOR=AC.createDynamicsCompressor();MASTER.connect(COMPRESSOR);COMPRESSOR.connect(AC.destination);const REC_DEST=AC.createMediaStreamDestination();MASTER.connect(REC_DEST);let BPM=120,playing=false,recording=false,metroOn=false,loopOn=false,playStartAC=0,playOffset=0,zoom=80,prOctave=4,prTool='draw',prQuant=0.5,selectedTrackId=null,selectedClipId=null,activePanel=null,drumPlaying=false,drumStep=0,drumIntervalId=null,tracks=[],trackIdCounter=0,clipIdCounter=0,mediaRecorder=null,recordChunks=[];const INSTRUMENTS=[{id:'synthLead',name:'Synth Lead',icon:'🎹',color:'#ff6b35',type:'synth',wave:'sawtooth',filter:2200,attack:0.01,decay:0.1,sustain:0.6,release:0.3},{id:'synthBass',name:'Synth Bass',icon:'🎸',color:'#e74c3c',type:'synth',wave:'square',filter:800,attack:0.01,decay:0.15,sustain:0.5,release:0.2},{id:'electricPiano',name:'Electric Piano',icon:'🎼',color:'#4ecdc4',type:'synth',wave:'triangle',filter:3500,attack:0.005,decay:0.4,sustain:0.3,release:0.5},{id:'pad',name:'Ambient Pad',icon:'🌊',color:'#a29bfe',type:'synth',wave:'sine',filter:1200,attack:0.3,decay:0.5,sustain:0.8,release:1.5},{id:'brass',name:'Brass',icon:'🎺',color:'#f1c40f',type:'synth',wave:'sawtooth',filter:1800,attack:0.05,decay:0.1,sustain:0.7,release:0.2},{id:'strings',name:'Strings',icon:'🎻',color:'#fd79a8',type:'synth',wave:'sawtooth',filter:2800,attack:0.2,decay:0.3,sustain:0.9,release:0.8},{id:'organ',name:'Organ',icon:'⛪',color:'#00b894',type:'synth',wave:'square',filter:4000,attack:0.01,decay:0.0,sustain:1.0,release:0.05},{id:'drums',name:'Drum Machine',icon:'🥁',color:'#e17055',type:'drums'},{id:'mic',name:'Microphone',icon:'🎤',color:'#74b9ff',type:'audio'}];const DRUM_PADS=[{name:'Kick',key:'drum-kick'},{name:'Snare',key:'drum-snare'},{name:'Hi-Hat',key:'drum-hat'},{name:'Open HH',key:'drum-ohh'},{name:'Clap',key:'drum-clap'},{name:'Tom Hi',key:'drum-tomhi'},{name:'Tom Lo',key:'drum-tomlo'},{name:'Cymbal',key:'drum-cymbal'}];const DRUM_STEPS=16;let drumPattern={};DRUM_PADS.forEach(p=>{drumPattern[p.key]=new Array(DRUM_STEPS).fill(false);});function noteFreq(midi){return 440*Math.pow(2,(midi-69)/12);}function playNote(instId,midi,t0,dur,vol=0.8){const inst=INSTRUMENTS.find(i=>i.id===instId);if(!inst)return;if(inst.type==='drums'){playDrum(midi,t0,vol);return;}const g=AC.createGain();g.connect(MASTER);const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=inst.filter||3000;f.Q.value=1;g.connect(f);f.connect(MASTER);g.disconnect(MASTER);const freq=noteFreq(midi);const a=inst.attack||0.01,d=inst.decay||0.1,s=inst.sustain||0.7,r=inst.release||0.3;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+a);g.gain.linearRampToValueAtTime(vol*s,t0+a+d);g.gain.setValueAtTime(vol*s,t0+dur-r>t0+a+d?t0+dur-r:t0+a+d);g.gain.linearRampToValueAtTime(0.0001,t0+dur+r);const osc=AC.createOscillator();osc.type=inst.wave||'sawtooth';osc.frequency.value=freq;osc.connect(f);osc.start(t0);osc.stop(t0+dur+r+0.1);if(inst.id==='pad'||inst.id==='strings'){const osc2=AC.createOscillator();osc2.type='sine';osc2.frequency.value=freq*2.001;osc2.connect(f);osc2.start(t0);osc2.stop(t0+dur+r+0.1);const osc3=AC.createOscillator();osc3.type='triangle';osc3.frequency.value=freq*0.5;osc3.connect(f);osc3.start(t0);osc3.stop(t0+dur+r+0.1);}if(inst.id==='organ'){for(let h=2;h<=4;h++){const ho=AC.createOscillator();ho.type='sine';ho.frequency.value=freq*h;const hg=AC.createGain();hg.gain.value=0.3/h;ho.connect(hg);hg.connect(f);ho.start(t0);ho.stop(t0+dur+0.1);}}}function playDrum(key,t0,vol=0.8){const g=AC.createGain();g.connect(MASTER);if(key==='drum-kick'){const osc=AC.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(180,t0);osc.frequency.exponentialRampToValueAtTime(40,t0+0.15);g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.4);osc.connect(g);osc.start(t0);osc.stop(t0+0.42);}else if(key==='drum-snare'){const buf=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const ns=AC.createBufferSource();ns.buffer=buf;const fl=AC.createBiquadFilter();fl.type='highpass';fl.frequency.value=900;ns.connect(fl);fl.connect(g);g.gain.setValueAtTime(vol*0.8,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.22);ns.start(t0);const osc=AC.createOscillator();osc.type='triangle';osc.frequency.value=200;const og=AC.createGain();og.gain.setValueAtTime(vol*0.5,t0);og.gain.exponentialRampToValueAtTime(0.001,t0+0.1);osc.connect(og);og.connect(MASTER);osc.start(t0);osc.stop(t0+0.12);}else if(key==='drum-hat'||key==='drum-ohh'){const len=key==='drum-hat'?0.08:0.35;const buf=AC.createBuffer(1,AC.sampleRate*len,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const ns=AC.createBufferSource();ns.buffer=buf;const fl=AC.createBiquadFilter();fl.type='highpass';fl.frequency.value=7000;ns.connect(fl);fl.connect(g);g.gain.setValueAtTime(vol*0.5,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+len);ns.start(t0);}else if(key==='drum-clap'){for(let i=0;i<3;i++){const buf=AC.createBuffer(1,AC.sampleRate*0.04,AC.sampleRate);const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=Math.random()*2-1;const ns=AC.createBufferSource();ns.buffer=buf;const fl=AC.createBiquadFilter();fl.type='bandpass';fl.frequency.value=1200;ns.connect(fl);fl.connect(g);g.gain.setValueAtTime(vol*0.6,t0+i*0.012);g.gain.exponentialRampToValueAtTime(0.001,t0+0.1+i*0.012);ns.start(t0+i*0.012);}}else if(key==='drum-tomhi'||key==='drum-tomlo'){const freq=key==='drum-tomhi'?300:150;const osc=AC.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(freq,t0);osc.frequency.exponentialRampToValueAtTime(freq*0.4,t0+0.2);g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.3);osc.connect(g);osc.start(t0);osc.stop(t0+0.32);}else if(key==='drum-cymbal'){const buf=AC.createBuffer(1,AC.sampleRate*0.8,AC.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const ns=AC.createBufferSource();ns.buffer=buf;const fl=AC.createBiquadFilter();fl.type='highpass';fl.frequency.value=5000;ns.connect(fl);fl.connect(g);g.gain.setValueAtTime(vol*0.4,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.8);ns.start(t0);}}function playMetro(t0,accent){const osc=AC.createOscillator();const g=AC.createGain();osc.connect(g);g.connect(MASTER);osc.frequency.value=accent?1200:800;g.gain.setValueAtTime(0.3,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.05);osc.start(t0);osc.stop(t0+0.06);}let scheduleAhead=0.1,scheduleLookAhead=25,nextNoteTime=0,currentBeat=0,schedTimer=null;function scheduleNotes(){while(nextNoteTime<AC.currentTime+scheduleAhead){const beat=currentBeat;const beatTime=nextNoteTime;if(metroOn){const sig=parseInt(document.getElementById('sig-sel').value)||4;playMetro(beatTime,beat%sig===0);}tracks.forEach(tr=>{if(tr.mute)return;if(tracks.some(t=>t.solo)&&!tr.solo)return;if(tr.inst==='drums')return;const beatSec=beatTime-playStartAC+playOffset;tr.clips.forEach(clip=>{clip.notes.forEach(n=>{const nStart=clip.startBeat*(60/BPM)+n.startBeat*(60/BPM);const nEnd=nStart+n.durBeats*(60/BPM);if(nStart>=beatSec-0.001&&nStart<beatSec+(60/BPM)){const t0=beatTime+(nStart-beatSec);playNote(tr.inst,n.midi,t0,n.durBeats*(60/BPM),tr.vol);}});});});nextNoteTime+=60/BPM;currentBeat++;}schedTimer=setTimeout(scheduleNotes,scheduleLookAhead);}function startDrumScheduler(){if(drumPlaying)return;drumPlaying=true;drumStep=0;document.getElementById('drum-play-btn').textContent='⏹ Stop';const stepDur=()=>(60/BPM)/4;let lastStep=-1;function tick(){if(!drumPlaying)return;const elapsed=AC.currentTime-playStartAC+playOffset;const stepN=Math.floor(elapsed/stepDur())%DRUM_STEPS;if(stepN!==lastStep){lastStep=stepN;DRUM_PADS.forEach(p=>{if(drumPattern[p.key][stepN]){playDrum(p.key,AC.currentTime,0.8);}});highlightDrumStep(stepN);}drumIntervalId=requestAnimationFrame(tick);}tick();}function stopDrumScheduler(){drumPlaying=false;document.getElementById('drum-play-btn').textContent='▶ Play';if(drumIntervalId)cancelAnimationFrame(drumIntervalId);highlightDrumStep(-1);}function highlightDrumStep(step){document.querySelectorAll('.drum-pad').forEach(el=>{el.style.outline=parseInt(el.dataset.step)===step?'2px solid #fff':''});}</script><script>function createTrack(instId,name){trackIdCounter++;const inst=INSTRUMENTS.find(i=>i.id===instId);const tr={id:'trk'+trackIdCounter,name:name||inst.name+' '+trackIdCounter,inst:instId,mute:false,solo:false,vol:0.8,pan:0,clips:[],fx:{reverb:0,delay:0,eq:{low:0,mid:0,high:0}}};tracks.push(tr);renderAll();return tr;}function deleteTrack(id){tracks=tracks.filter(t=>t.id!==id);if(selectedTrackId===id)selectedTrackId=null;renderAll();}function beatsToPx(b){return b*(60/BPM)*zoom;}function pxToBeats(px){return px/zoom/(60/BPM);}function renderInstList(){const el=document.getElementById('inst-list');el.innerHTML='';INSTRUMENTS.forEach(inst=>{const div=document.createElement('div');div.className='inst-item';div.innerHTML='<span class="icon">'+inst.icon+'</span><div class="info"><span class="iname">'+inst.name+'</span><span class="itype">'+inst.type+'</span></div>';div.onclick=()=>{createTrack(inst.id);if(inst.type==='drums')openPanel('drum');};el.appendChild(div);});}function renderAll(){renderTracks();renderMixer();renderTimeline();renderPlayhead();}function renderTracks(){const container=document.getElementById('tracks-container');Array.from(container.querySelectorAll('.track-row')).forEach(e=>e.remove());tracks.forEach(tr=>{const row=document.createElement('div');row.className='track-row';row.dataset.id=tr.id;const inst=INSTRUMENTS.find(i=>i.id===tr.inst);row.innerHTML='<div class="track-head"><div class="track-name-row"><span style="font-size:13px">'+inst.icon+'</span><input class="track-name" value="'+tr.name+'" data-id="'+tr.id+'"></div><div class="track-btns"><button class="trkbtn mute '+(tr.mute?'on':'')+'" data-act="mute">M</button><button class="trkbtn solo '+(tr.solo?'on':'')+'" data-act="solo">S</button><button class="trkbtn" data-act="fx">FX</button><button class="trkbtn" data-act="del">✕</button></div><div class="track-vol-row"><label>Vol</label><input type="range" class="track-vol" min="0" max="1" step=".01" value="'+tr.vol+'"></div></div><div class="track-lane" data-id="'+tr.id+'"></div>';container.appendChild(row);const lane=row.querySelector('.track-lane');tr.clips.forEach(clip=>renderClip(lane,tr,clip));lane.onmousedown=(e)=>{if(e.target!==lane)return;const rect=lane.getBoundingClientRect();const startBeat=Math.max(0,Math.round(pxToBeats(e.clientX-rect.left)*4)/4);const clip=createClip(tr,startBeat,4);renderClip(lane,tr,clip);};row.querySelector('[data-act="mute"]').onclick=()=>{tr.mute=!tr.mute;renderAll();};row.querySelector('[data-act="solo"]').onclick=()=>{tr.solo=!tr.solo;renderAll();};row.querySelector('[data-act="del"]').onclick=()=>{if(confirm('Delete track "'+tr.name+'"?'))deleteTrack(tr.id);};row.querySelector('[data-act="fx"]').onclick=()=>{selectedTrackId=tr.id;openPanel('fx');renderFx();};row.querySelector('.track-vol').oninput=(e)=>{tr.vol=parseFloat(e.target.value);renderMixer();};row.querySelector('.track-name').onchange=(e)=>{tr.name=e.target.value;};});}function createClip(tr,startBeat,lenBeats){clipIdCounter++;const clip={id:'clip'+clipIdCounter,startBeat,lenBeats,notes:tr.inst==='drums'?[]:defaultMelodyNotes()};tr.clips.push(clip);return clip;}function defaultMelodyNotes(){return [{midi:60,startBeat:0,durBeats:0.5},{midi:64,startBeat:1,durBeats:0.5},{midi:67,startBeat:2,durBeats:0.5},{midi:72,startBeat:3,durBeats:0.5}];}function renderClip(lane,tr,clip){const el=document.createElement('div');el.className='clip midi-clip'+(selectedClipId===clip.id?' sel':'');el.style.left=beatsToPx(clip.startBeat)+'px';el.style.width=beatsToPx(clip.lenBeats)+'px';el.innerHTML='<div class="clip-label">'+tr.name+'</div><canvas></canvas>';el.onclick=(e)=>{e.stopPropagation();selectedTrackId=tr.id;selectedClipId=clip.id;openPianoRoll(tr,clip);};lane.appendChild(el);const cv=el.querySelector('canvas');requestAnimationFrame(()=>{cv.width=cv.clientWidth;cv.height=cv.clientHeight;const ctx=cv.getContext('2d');ctx.fillStyle='rgba(255,255,255,.6)';clip.notes.forEach(n=>{const x=(n.startBeat/clip.lenBeats)*cv.width;const w=Math.max(2,(n.durBeats/clip.lenBeats)*cv.width-1);const y=cv.height-((n.midi-40)/60)*cv.height;ctx.fillRect(x,y,w,2);});});}function renderTimeline(){const cv=document.getElementById('tl-ruler');cv.width=cv.parentElement.clientWidth;cv.height=28;const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#666';ctx.font='10px sans-serif';const sig=parseInt(document.getElementById('sig-sel').value)||4;const beatsVisible=cv.width/zoom/(60/BPM);for(let b=0;b<=beatsVisible+4;b++){const x=beatsToPx(b);if(b%sig===0){ctx.strokeStyle='#666';ctx.beginPath();ctx.moveTo(x,10);ctx.lineTo(x,28);ctx.stroke();ctx.fillText(String(b/sig+1),x+3,20);}else{ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(x,18);ctx.lineTo(x,28);ctx.stroke();}}}document.getElementById('tl-ruler').onclick=(e)=>{const rect=e.target.getBoundingClientRect();const beat=pxToBeats(e.clientX-rect.left);playOffset=beat*(60/BPM);renderPlayhead();};function renderPlayhead(){const ph=document.getElementById('playhead');const elapsedSec=playing?(AC.currentTime-playStartAC)+playOffset:playOffset;const beat=elapsedSec/(60/BPM);ph.style.left=beatsToPx(beat)+'px';ph.style.height=(tracks.length*72)+'px';const mins=Math.floor(elapsedSec/60);const secs=(elapsedSec%60).toFixed(3);document.getElementById('transport-time').textContent=mins+':'+(secs.padStart(6,'0'));if(playing)requestAnimationFrame(renderPlayhead);}</script><script>function openPanel(name){['mixer','fx','drum','keyboard'].forEach(p=>{document.getElementById(p+'-panel').classList.remove('open');});if(activePanel===name){activePanel=null;return;}activePanel=name;document.getElementById(name+'-panel').classList.add('open');if(name==='mixer')renderMixer();if(name==='drum')renderDrumGrid();if(name==='keyboard')renderKeyboard();}document.getElementById('btn-mixer').onclick=()=>openPanel('mixer');document.getElementById('btn-fx').onclick=()=>openPanel('fx');document.getElementById('btn-drums').onclick=()=>openPanel('drum');document.getElementById('btn-keyboard').onclick=()=>openPanel('keyboard');document.getElementById('fx-close').onclick=()=>openPanel('fx');document.getElementById('drum-close').onclick=()=>openPanel('drum');document.getElementById('kb-close').onclick=()=>openPanel('keyboard');function renderMixer(){const wrap=document.getElementById('mixer-tracks');wrap.innerHTML='';tracks.forEach(tr=>{const strip=document.createElement('div');strip.className='mixer-strip';strip.innerHTML='<div class="strip-name">'+tr.name+'</div><div class="fader-wrap"><input type="range" min="0" max="1" step=".01" value="'+tr.vol+'" class="mstrip-fader"><div class="vu"><div class="vu-bar"></div></div></div><input type="range" class="strip-pan" min="-1" max="1" step=".01" value="'+tr.pan+'"><div style="display:flex;gap:3px"><button class="strip-btn mstrip-mute '+(tr.mute?'on':'')+'">M</button><button class="strip-btn mstrip-solo '+(tr.solo?'on':'')+'">S</button></div>';strip.querySelector('.mstrip-fader').oninput=(e)=>{tr.vol=parseFloat(e.target.value);renderTracks();};strip.querySelector('.strip-pan').oninput=(e)=>{tr.pan=parseFloat(e.target.value);};strip.querySelector('.mstrip-mute').onclick=(e)=>{tr.mute=!tr.mute;renderAll();};strip.querySelector('.mstrip-solo').onclick=(e)=>{tr.solo=!tr.solo;renderAll();};wrap.appendChild(strip);});}document.getElementById('master-fader').oninput=(e)=>{MASTER.gain.value=parseFloat(e.target.value);document.getElementById('vol-master').value=e.target.value;};document.getElementById('vol-master').oninput=(e)=>{MASTER.gain.value=parseFloat(e.target.value);document.getElementById('master-fader').value=e.target.value;};function renderFx(){const el=document.getElementById('fx-inner');const tr=tracks.find(t=>t.id===selectedTrackId);if(!tr){el.innerHTML='<p style="color:var(--dim);font-size:11px;padding:10px">Select a track to edit effects.</p>';return;}el.innerHTML='<div class="fx-slot"><h5>'+tr.name+' — EQ</h5><div class="fx-knob-row"><div class="fx-knob"><input type="range" min="-12" max="12" value="'+tr.fx.eq.low+'" id="eq-low"><label>Low</label></div><div class="fx-knob"><input type="range" min="-12" max="12" value="'+tr.fx.eq.mid+'" id="eq-mid"><label>Mid</label></div><div class="fx-knob"><input type="range" min="-12" max="12" value="'+tr.fx.eq.high+'" id="eq-high"><label>High</label></div></div></div><div class="fx-slot"><h5>Reverb</h5><div class="fx-knob-row"><div class="fx-knob"><input type="range" min="0" max="1" step=".01" value="'+tr.fx.reverb+'" id="fx-reverb"><label>Amount</label></div></div></div><div class="fx-slot"><h5>Delay</h5><div class="fx-knob-row"><div class="fx-knob"><input type="range" min="0" max="1" step=".01" value="'+tr.fx.delay+'" id="fx-delay"><label>Amount</label></div></div></div>';document.getElementById('eq-low').oninput=(e)=>tr.fx.eq.low=parseFloat(e.target.value);document.getElementById('eq-mid').oninput=(e)=>tr.fx.eq.mid=parseFloat(e.target.value);document.getElementById('eq-high').oninput=(e)=>tr.fx.eq.high=parseFloat(e.target.value);document.getElementById('fx-reverb').oninput=(e)=>tr.fx.reverb=parseFloat(e.target.value);document.getElementById('fx-delay').oninput=(e)=>tr.fx.delay=parseFloat(e.target.value);}function renderDrumGrid(){const el=document.getElementById('drum-inner');el.innerHTML='';DRUM_PADS.forEach(p=>{const row=document.createElement('div');row.className='drum-row';let padsHtml='<span class="drum-name">'+p.name+'</span>';for(let s=0;s<DRUM_STEPS;s++){padsHtml+='<button class="drum-pad '+(drumPattern[p.key][s]?'on':'')+'" data-key="'+p.key+'" data-step="'+s+'" style="'+(s%4===0?'margin-left:4px;':'')+'"></button>';}row.innerHTML=padsHtml;el.appendChild(row);});el.querySelectorAll('.drum-pad').forEach(btn=>{btn.onclick=()=>{const key=btn.dataset.key,step=parseInt(btn.dataset.step);drumPattern[key][step]=!drumPattern[key][step];btn.classList.toggle('on');if(drumPattern[key][step])playDrum(key,AC.currentTime,0.7);};});}document.getElementById('drum-play-btn').onclick=()=>{if(drumPlaying)stopDrumScheduler();else{AC.resume();if(!playing){playStartAC=AC.currentTime;}startDrumScheduler();}};document.getElementById('drum-clear').onclick=()=>{DRUM_PADS.forEach(p=>drumPattern[p.key].fill(false));renderDrumGrid();};document.getElementById('drum-random').onclick=()=>{DRUM_PADS.forEach(p=>{for(let s=0;s<DRUM_STEPS;s++)drumPattern[p.key][s]=Math.random()<0.2;});renderDrumGrid();};const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];function renderKeyboard(){const wrap=document.getElementById('kb-wrap');wrap.innerHTML='';const sel=document.getElementById('kb-inst-sel');sel.innerHTML=INSTRUMENTS.filter(i=>i.type==='synth').map(i=>'<option value="'+i.id+'">'+i.icon+' '+i.name+'</option>').join('');const startMidi=(prOctave)*12;for(let i=0;i<25;i++){const midi=startMidi+i;const name=NOTE_NAMES[midi%12];const isBlack=name.includes('#');const key=document.createElement('div');key.className='kb-key '+(isBlack?'black':'white');key.textContent=isBlack?'':name;key.dataset.midi=midi;key.onmousedown=()=>{const instId=sel.value;playNote(instId,midi,AC.currentTime,0.4,0.7);key.classList.add('active');};key.onmouseup=()=>key.classList.remove('active');key.onmouseleave=()=>key.classList.remove('active');wrap.appendChild(key);}}document.getElementById('kb-oct-up').onclick=()=>{prOctave=Math.min(7,prOctave+1);document.getElementById('kb-oct-label').textContent=prOctave;renderKeyboard();};document.getElementById('kb-oct-down').onclick=()=>{prOctave=Math.max(1,prOctave-1);document.getElementById('kb-oct-label').textContent=prOctave;renderKeyboard();};</script><script>let prClip=null,prTrack=null;function openPianoRoll(tr,clip){prTrack=tr;prClip=clip;document.getElementById('pianoroll-wrap').classList.add('open');document.getElementById('pr-topbar').querySelector('h3').textContent='Piano Roll — '+tr.name;renderPianoRoll();}document.getElementById('pr-close').onclick=()=>{document.getElementById('pianoroll-wrap').classList.remove('open');selectedClipId=null;renderTracks();};document.getElementById('pr-tool-draw').onclick=()=>{prTool='draw';};document.getElementById('pr-tool-sel').onclick=()=>{prTool='select';};document.getElementById('pr-tool-erase').onclick=()=>{prTool='erase';};document.getElementById('pr-quant').onchange=(e)=>{prQuant=parseFloat(e.target.value);};const PR_ROWH=14,PR_NOTES=48,PR_TOPMIDI=84;function renderPianoRoll(){const keysCv=document.getElementById('pr-keys');const gridCv=document.getElementById('pr-grid');const scrollEl=document.getElementById('pr-scroll');const totalH=PR_NOTES*PR_ROWH;const totalW=beatsToPx(prClip.lenBeats);keysCv.width=40;keysCv.height=totalH;gridCv.width=Math.max(totalW,600);gridCv.height=totalH;gridCv.style.height=totalH+'px';gridCv.style.width=gridCv.width+'px';const kctx=keysCv.getContext('2d');kctx.clearRect(0,0,40,totalH);for(let i=0;i<PR_NOTES;i++){const midi=PR_TOPMIDI-i;const isBlack=NOTE_NAMES[midi%12].includes('#');kctx.fillStyle=isBlack?'#111':'#ddd';kctx.fillRect(0,i*PR_ROWH,40,PR_ROWH-1);if(midi%12===0){kctx.fillStyle='#000';kctx.font='9px sans-serif';kctx.fillText('C'+Math.floor(midi/12-1),2,i*PR_ROWH+10);}}const gctx=gridCv.getContext('2d');gctx.clearRect(0,0,gridCv.width,totalH);for(let i=0;i<PR_NOTES;i++){const midi=PR_TOPMIDI-i;const isBlack=NOTE_NAMES[midi%12].includes('#');gctx.fillStyle=isBlack?'#1a1a1a':'#222';gctx.fillRect(0,i*PR_ROWH,gridCv.width,PR_ROWH-1);}const beatPx=beatsToPx(1);for(let b=0;b<=prClip.lenBeats;b++){gctx.strokeStyle=b%4===0?'#666':'#333';gctx.beginPath();gctx.moveTo(b*beatPx,0);gctx.lineTo(b*beatPx,totalH);gctx.stroke();}prClip.notes.forEach((n,idx)=>{const x=n.startBeat*beatPx;const y=(PR_TOPMIDI-n.midi)*PR_ROWH;const w=n.durBeats*beatPx;gctx.fillStyle='#ff6b35';gctx.fillRect(x,y,w-1,PR_ROWH-2);gctx.strokeStyle='#fff';gctx.strokeRect(x,y,w-1,PR_ROWH-2);});gridCv.onmousedown=(e)=>{const rect=gridCv.getBoundingClientRect();const x=e.clientX-rect.left,y=e.clientY-rect.top;const midi=PR_TOPMIDI-Math.floor(y/PR_ROWH);const beat=Math.floor((x/beatPx)/prQuant)*prQuant;if(prTool==='draw'){const existing=prClip.notes.findIndex(n=>n.midi===midi&&Math.abs(n.startBeat-beat)<prQuant/2);if(existing>=0){prClip.notes.splice(existing,1);}else{prClip.notes.push({midi,startBeat:beat,durBeats:prQuant});playNote(prTrack.inst,midi,AC.currentTime,0.3,0.6);}renderPianoRoll();renderTracks();}else if(prTool==='erase'){const idx=prClip.notes.findIndex(n=>n.midi===midi&&beat>=n.startBeat&&beat<n.startBeat+n.durBeats);if(idx>=0){prClip.notes.splice(idx,1);renderPianoRoll();renderTracks();}}};}document.getElementById('pr-play').onclick=()=>{if(!prClip)return;AC.resume();const t0=AC.currentTime;prClip.notes.forEach(n=>{playNote(prTrack.inst,n.midi,t0+n.startBeat*(60/BPM),n.durBeats*(60/BPM),prTrack.vol);});};</script><script>function play(){if(playing)return;AC.resume();playing=true;playStartAC=AC.currentTime;currentBeat=Math.floor(playOffset/(60/BPM));nextNoteTime=AC.currentTime;document.getElementById('btn-play').classList.add('on');scheduleNotes();renderPlayhead();}function stopPlayback(){playing=false;if(schedTimer)clearTimeout(schedTimer);document.getElementById('btn-play').classList.remove('on');document.getElementById('btn-rec').classList.remove('on');recording=false;if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();stopDrumScheduler();renderPlayhead();}function rewind(){playOffset=0;renderPlayhead();}document.getElementById('btn-play').onclick=()=>{if(playing){stopPlayback();}else{play();}};document.getElementById('btn-stop').onclick=()=>{stopPlayback();playOffset=playing?playOffset:playOffset;const wasPlaying=playing;stopPlayback();if(!wasPlaying)playOffset=0;renderPlayhead();};document.getElementById('btn-rewind').onclick=rewind;document.getElementById('btn-metro').onclick=(e)=>{metroOn=!metroOn;e.target.classList.toggle('on',metroOn);};document.getElementById('tempo').onchange=(e)=>{BPM=parseInt(e.target.value)||120;renderTimeline();renderTracks();};document.getElementById('sig-sel').onchange=renderTimeline;document.getElementById('btn-zoom-in').onclick=()=>{zoom=Math.min(300,zoom+20);renderAll();};document.getElementById('btn-zoom-out').onclick=()=>{zoom=Math.max(30,zoom-20);renderAll();};document.getElementById('btn-rec').onclick=async()=>{if(!recording){recording=true;document.getElementById('btn-rec').classList.add('on');recordChunks=[];try{mediaRecorder=new MediaRecorder(REC_DEST.stream);mediaRecorder.ondataavailable=(e)=>recordChunks.push(e.data);mediaRecorder.onstop=()=>{const blob=new Blob(recordChunks,{type:'audio/webm'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='garageband-recording.webm';a.click();};mediaRecorder.start();}catch(err){console.error(err);}if(!playing)play();}else{recording=false;document.getElementById('btn-rec').classList.remove('on');if(mediaRecorder)mediaRecorder.stop();}};function saveProject(){const data={BPM,tracks,drumPattern,version:1};const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='project.gbweb';a.click();}document.getElementById('btn-save').onclick=saveProject;document.getElementById('btn-load').onclick=()=>document.getElementById('file-load').click();document.getElementById('file-load').onchange=(e)=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{try{const data=JSON.parse(ev.target.result);BPM=data.BPM||120;document.getElementById('tempo').value=BPM;tracks=data.tracks||[];if(data.drumPattern)drumPattern=data.drumPattern;renderAll();}catch(err){alert('Invalid project file');}};reader.readAsText(file);};async function exportWav(){const totalBeats=Math.max(16,...tracks.flatMap(t=>t.clips.map(c=>c.startBeat+c.lenBeats)));const durationSec=totalBeats*(60/BPM)+2;const offlineCtx=new OfflineAudioContext(2,Math.ceil(durationSec*44100),44100);const offMaster=offlineCtx.createGain();offMaster.gain.value=MASTER.gain.value;offMaster.connect(offlineCtx.destination);function offPlayNote(instId,midi,t0,dur,vol){const inst=INSTRUMENTS.find(i=>i.id===instId);if(!inst||inst.type==='drums')return;const g=offlineCtx.createGain();const f=offlineCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=inst.filter||3000;g.connect(f);f.connect(offMaster);const freq=noteFreq(midi);const a=inst.attack||0.01,d=inst.decay||0.1,s=inst.sustain||0.7,r=inst.release||0.3;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+a);g.gain.linearRampToValueAtTime(vol*s,t0+a+d);g.gain.setValueAtTime(vol*s,Math.max(t0+a+d,t0+dur-r));g.gain.linearRampToValueAtTime(0.0001,t0+dur+r);const osc=offlineCtx.createOscillator();osc.type=inst.wave||'sawtooth';osc.frequency.value=freq;osc.connect(f);osc.start(t0);osc.stop(t0+dur+r+0.05);}tracks.forEach(tr=>{if(tr.mute)return;if(tracks.some(t=>t.solo)&&!tr.solo)return;tr.clips.forEach(clip=>{clip.notes.forEach(n=>{const t0=(clip.startBeat+n.startBeat)*(60/BPM);offPlayNote(tr.inst,n.midi,t0,n.durBeats*(60/BPM),tr.vol);});});});const rendered=await offlineCtx.startRendering();const wavBlob=bufferToWav(rendered);const url=URL.createObjectURL(wavBlob);const a=document.createElement('a');a.href=url;a.download='garageband-export.wav';a.click();}function bufferToWav(buffer){const numCh=buffer.numberOfChannels,len=buffer.length*numCh*2+44;const bufArr=new ArrayBuffer(len),view=new DataView(bufArr);const writeStr=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};writeStr(0,'RIFF');view.setUint32(4,len-8,true);writeStr(8,'WAVE');writeStr(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,numCh,true);view.setUint32(24,buffer.sampleRate,true);view.setUint32(28,buffer.sampleRate*numCh*2,true);view.setUint16(32,numCh*2,true);view.setUint16(34,16,true);writeStr(36,'data');view.setUint32(40,len-44,true);let offset=44;for(let i=0;i<buffer.length;i++){for(let ch=0;ch<numCh;ch++){let sample=buffer.getChannelData(ch)[i];sample=Math.max(-1,Math.min(1,sample));view.setInt16(offset,sample<0?sample*0x8000:sample*0x7fff,true);offset+=2;}}return new Blob([bufArr],{type:'audio/wav'});}document.getElementById('btn-export').onclick=()=>{exportWav();};function init(){renderInstList();createTrack('synthLead');createTrack('drums');renderAll();}init();</script></body></html>
